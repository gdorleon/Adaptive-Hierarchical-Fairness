# ML1M configuration
dataset: ml1m
data_path: data/processed/ml1m.pkl

beta: 0.5
gamma: 0.1
k: 20
topn: 100

lambda_decay: 0.05
kappa: 0.5
svi_steps: 80000
lr: 0.01
batch_size: 256
sigma_global: 1.0
sigma_group: 0.5
sigma_ind: 0.3

n_super: 6

sensitive_cols:
  - gender
  - age_group

n_runs: 5
seeds: [42, 43, 44, 45, 46]
